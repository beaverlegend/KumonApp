<!DOCTYPE html>
<html>
<head>
    <title>Kumon Progress Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="h3">Kumon Student Progress</h1>
            </div>
            <div class="card-body">
                <p>Latest performance data from Google Forms:</p>
                <div class="table-responsive">
                    {{ table_html | safe }}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
