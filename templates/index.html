<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-section { border-bottom: 2px solid #007bff; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container shadow-sm">
    <div class="header-section">
        <h1 class="text-primary">Kumon Center Progress</h1>
        <p class="text-muted">Live Database View</p>
    </div>

    <div class="table-responsive">
        {{ table_html | safe }}
    </div>

    <div class="mt-4">
        <button class="btn btn-outline-primary btn-sm" onclick="window.location.reload()">Refresh Data</button>
    </div>
</div>

</body>
</html>
